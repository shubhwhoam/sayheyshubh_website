<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BSc Zoology Important Questions | SayHeyShubh</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .notes-container { max-width: 1200px; margin: 0 auto; padding: 2rem; min-height: 80vh; }
    .back-btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.8rem 1.5rem; background: linear-gradient(135deg, #ef4444, #dc2626); color: white; text-decoration: none; border-radius: 10px; font-weight: 600; margin-bottom: 2rem; }
    .notes-header { text-align: center; margin-bottom: 3rem; padding: 2rem; background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%); border-radius: 20px; }
    .notes-header h1 { font-size: 2.5rem; color: #2d3748; margin-bottom: 1rem; }
    .navigation-buttons { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; }
    .nav-button { background: linear-gradient(135deg, #6366f1, #4f46e5); color: white; border-radius: 15px; padding: 1.5rem; font-size: 1.1rem; font-weight: 600; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 0.5rem; transition: transform 0.3s; }
    .nav-button:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4); }
    .content-section { background: white; border-radius: 15px; padding: 2rem; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1); }
  </style>
</head>
<body>
  <div class="notes-container">
    <a href="youtube" class="back-btn">← Back to YouTube Page</a>
    <div class="notes-header">
      <h1>Most Important Questions 🎯</h1>
      <p>Select your academic year to view unit-wise important questions that frequently appear in DU Zoology exams.</p>
    </div>
    <div class="content-section">
      <h2 style="text-align: center; margin-bottom: 2rem;">Select Academic Year ✍️</h2>
      <div class="navigation-buttons">
        <a href="zoology-iq-first-year" class="nav-button">📖 First Year</a>
        <a href="zoology-iq-second-year" class="nav-button">📖 Second Year</a>
        <a href="zoology-iq-third-year" class="nav-button">📖 Third Year</a>
      </div>
    </div>
  </div>
</body>
</html>
