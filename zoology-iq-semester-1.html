<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BSc Zoology Semester 1 Important Questions | SayHeyShubh</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .notes-container { max-width: 1200px; margin: 0 auto; padding: 2rem; min-height: 80vh; }
    .back-btn { display: inline-flex; padding: 0.8rem 1.5rem; background: #6366f1; color: white; text-decoration: none; border-radius: 10px; font-weight: 600; margin-bottom: 2rem; }
    .subject-section { background: white; border-radius: 15px; padding: 2rem; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1); margin-bottom: 2rem; border-top: 5px solid #10b981; }
    .subject-title { color: #2d3748; margin-bottom: 1.5rem; font-size: 1.8rem; border-bottom: 2px solid #f1f5f9; padding-bottom: 0.5rem; }
    .unit-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1rem; }
    .unit-card { border: 1px solid #e2e8f0; padding: 1.5rem; border-radius: 12px; transition: all 0.2s; display: flex; justify-content: space-between; align-items: center; }
    .unit-card:hover { border-color: #10b981; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.1); transform: translateY(-2px); }
    .unit-info h3 { font-size: 1.1rem; color: #1e293b; margin-bottom: 0.2rem; }
    .unit-info p { font-size: 0.9rem; color: #64748b; margin: 0; }
    .view-btn { background: #10b981; color: white; padding: 0.6rem 1.2rem; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 0.9rem; transition: background 0.3s; }
    .view-btn:hover { background: #059669; }
  </style>
</head>
<body>
  <div class="notes-container">
    <a href="zoology-iq-first-year" class="back-btn">← Back to Semesters</a>

    <div class="subject-section">
      <h2 class="subject-title">🌿 Ecology</h2>
      <div class="unit-grid">
        <div class="unit-card">
          <div class="unit-info">
            <h3>Unit 1: Introduction to Ecology</h3>
            <p>Ecosystems, Biosphere, etc.</p>
          </div>
          <a href="iq-ecology-unit-1" class="view-btn">View Questions</a>
        </div>
        <div class="unit-card">
          <div class="unit-info">
            <h3>Unit 2: Population Ecology</h3>
            <p>Growth curves, dynamics</p>
          </div>
          <a href="iq-ecology-unit-2" class="view-btn">View Questions</a>
        </div>
      </div>
    </div>

    <div class="subject-section" style="border-top-color: #f59e0b;">
      <h2 class="subject-title">🐙 Non-Chordates</h2>
      <div class="unit-grid">
        <div class="unit-card">
          <div class="unit-info">
            <h3>Unit 1: Protista to Porifera</h3>
            <p>Locomotion, reproduction</p>
          </div>
          <a href="iq-nonchordates-unit-1" class="view-btn">View Questions</a>
        </div>
      </div>
    </div>

  </div>
</body>
</html>
